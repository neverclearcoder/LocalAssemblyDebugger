name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore LocalAssemblyDebugger.sln

      - name: Build
        run: msbuild LocalAssemblyDebugger.csproj /p:Configuration=Release /p:Platform=AnyCPU /nologo /verbosity:minimal
